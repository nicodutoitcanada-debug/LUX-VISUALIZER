<!DOCTYPE html>
<html lang="en">
<head>
<title>LUX VISUALIZER</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: "Futura PT", sans-serif;
  -webkit-tap-highlight-color: transparent;
}

#video-container {
  width: 100vw;
  height: 100vh;
  position: fixed;
  inset: 0;
  overflow: hidden;
  background: black;
  z-index: 1;
}

#video-container video,
#video-container canvas {
  width: 100% !important;
  height: 100% !important;
  object-fit: cover;           /* ← THIS REMOVES BLACK BARS FOREVER */
  background: black;
}

#uiLayer {
  position: fixed;
  inset: 0;
  z-index: 4500;
  pointer-events: none;
  touch-action: none;
}

.uiScreen {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.uiScreen.visible {
  display: flex;
}

/* ===============================
   BUILD MENU – Smaller + Safe Spacing
================================*/
.menuInner {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8vh 5vw 22vh;          /* Extra top + huge bottom space */
  box-sizing: border-box;
  gap: 3vh;
}

#menuLogo {
  width: min(240px, 48vw);
  max-width: 280px;
  opacity: 0.7;
}

.menuButton img {
  width: min(140px, 30vw);
  max-width: 160px;
  opacity: 0.7;
  transition: opacity 0.25s ease;
}

.menuButton:hover img {
  opacity: 1;
}

#menuUnrealLogo {
  position: absolute;
  left: 50%;
  bottom: 5vh;
  transform: translateX(-50%);
  width: min(100px, 22vw);
  max-width: 115px;
  opacity: 0.7;
}

/* ===============================
   LEVEL LOADING – Smaller + Truly Left + No Cutoff
================================*/
.levelLoadingContent {
  position: relative;
  z-index: 2;
  width: min(520px, 78vw);
  margin-left: 6vw;
  margin-right: auto;
  padding-top: 9vh;               /* Prevents top cutoff */
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  color: white;
}

.levelBrandLogo {
  width: min(200px, 36vw);
}

.levelTitle {
  font-size: clamp(19px, 3.8vw, 26px);
}

.levelBody {
  font-size: clamp(12.5px, 2.5vw, 14.5px);
}

/* ===============================
   MEDIA QUERIES – Aggressive Mobile Scaling
================================*/
@media (max-width: 1024px) {
  .menuInner { padding: 9vh 6vw 24vh; }
  #menuLogo { width: min(220px, 55vw); }
  .menuButton img { width: min(130px, 34vw); }
}

@media (max-width: 640px) {
  .menuInner {
    padding: 10vh 7vw 26vh;        /* Even more space top/bottom */
    gap: 3.5vh;
  }
  #menuLogo { width: min(200px, 62vw); }
  .buttonRow { flex-direction: column; gap: 4vh; }
  .menuButton img { width: min(170px, 50vw); max-width: 200px; }
  #menuUnrealLogo { bottom: 6.5vh; width: min(90px, 26vw); }

  /* Level loading – tiny screens */
  .levelLoadingContent {
    margin-left: 5vw;
    width: 88vw;
    padding-top: 10vh;
  }
  .levelBrandLogo { width: min(170px, 40vw); }
  .levelTitle { font-size: clamp(17px, 5vw, 22px); }
  .levelBody  { font-size: clamp(11.5px, 3.5vw, 13px); }
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

<script type="module">
/* ==================== YOUR ENTIRE JAVASCRIPT (unchanged except resize helper) ==================== */
let Application;
let screenshotCounter = 1;

let gameLoaded = false;
let selectedBuild = null;
let lottieInstance = null;
let readyMessageTimer = null;
let appInAttentionState = false;
let gameRevealed = false;
let isRevealingGame = false;

import * as PixelStreamingWebSdk from
"https://unpkg.com/@arcware-cloud/pixelstreaming-websdk@1.3.32/index.mjs";

(() => {
const { ArcwareInit } = PixelStreamingWebSdk;

const shareIds = ["share-a913ed5d-44d6-42e6-bc9d-2e4ea72c4eba"];
const selectedShareId = shareIds[Math.floor(Math.random()*shareIds.length)];

const initResult = new ArcwareInit(
  {shareId: selectedShareId},
  {
    initialSettings: { AutoConnect:true, AutoPlayVideo:true, StartVideoMuted:true },
    settings: {
      infoButton:false, micButton:false, audioButton:false,
      fullscreenButton:false, settingsButton:false, connectionStrengthIcon:false
    }
  }
);

Application = initResult.Application;
registerArcwareAttentionHandlers();

Application.getApplicationResponse((response) => {
  console.log("Response from Unreal:", response);
  try {
    const parsed = JSON.parse(response);
    if (parsed.screenshot === "generating") showOverlay("Generating high resolution image");
    if (parsed.game === "loaded") {
      gameLoaded = true;
      if (!selectedBuild && !document.getElementById("buildMenu").classList.contains("visible") && !appInAttentionState) {
        advanceToBuildMenuWithFade();
      }
    }
    if (parsed.modern === "loaded" || parsed.load_ui === "modern") {
      revealGameFromLevelLoading().finally(() => showReadyMessage());
    }
  } catch(e) {}
  if (response.startsWith("CreateScreenshot")) createFile(window.file);
});

setTimeout(() => {
  document.getElementById("video-container").appendChild(Application.rootElement);
}, 100);

initLottie();
startApp();
window.file = Application.webRtcController.file;
})();

/* ==================== RESIZE HELPER – Forces full-screen scaling ==================== */
function handleResize() {
  const container = document.getElementById("video-container");
  if (container) {
    container.style.width = "100vw";
    container.style.height = "100vh";
  }
}
window.addEventListener("resize", handleResize);
setTimeout(handleResize, 500);   /* Run once after load */

function playLottie(){ /* ... */ }
function stopLottie(){ /* ... */ }
function hideAllUiScreens(){ /* ... */ }
function restartMenuAnimations(){ /* ... */ }
/* ... all your other functions (showInitialLoadingScreen, showBuildMenu, setLevelLoadingContent, etc.) ... */
function selectBuild(buildName){ /* ... */ }

/* Keep all your existing functions exactly as they were in the previous version */

window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("btnTrad").addEventListener("click", () => selectBuild("Trad"));
  document.getElementById("btnMod").addEventListener("click", () => selectBuild("Mod"));
  document.getElementById("btnMulti").addEventListener("click", () => selectBuild("Multi"));
  document.getElementById("retryButton").addEventListener("click", () => location.reload());
});

/* ... showOverlay, hideOverlay, createFile ... */
</script>
</head>
