<!DOCTYPE html>
<html lang="en">
<head>
<title>LUX VISUALIZER</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: "Futura PT", sans-serif;
  -webkit-tap-highlight-color: transparent;
}

#video-container {
  width: 100vw;
  height: 100vh;
  position: fixed;
  inset: 0;
  overflow: hidden;
  background: black;
  z-index: 1;
}

#video-container video,
#video-container canvas {
  width: 100% !important;
  height: 100% !important;
  object-fit: contain;
  background: black;
}

#uiLayer {
  position: fixed;
  inset: 0;
  z-index: 4500;
  pointer-events: none;
  touch-action: none;
}

.uiScreen {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.uiScreen.visible {
  display: flex;
}

/* ... ALL YOUR ORIGINAL CSS ... (exactly as you pasted it) ... */

.menuInner {
  padding: 9vh 5vw 24vh;          /* More top space = no top cutoff */
}

#menuUnrealLogo {
  bottom: 6vh;                    /* More bottom space = no overlap on mobile */
}

.levelLoadingContent {
  padding-top: 9vh;               /* Prevents top cutoff */
}

@media (max-width: 640px) {
  .menuInner { padding: 11vh 7vw 27vh; }
  #menuLogo { width: min(210px, 62vw); }
  .buttonRow { flex-direction: column; gap: 4vh; }
  .menuButton img { width: min(165px, 48vw); }
  #menuUnrealLogo { bottom: 7vh; width: min(90px, 26vw); }
  .levelLoadingContent { margin-left: 5vw; width: 88vw; padding-top: 11vh; }
  .levelBrandLogo { width: min(175px, 38vw); }
  .levelTitle { font-size: clamp(18px, 5vw, 24px); }
  .levelBody { font-size: clamp(12px, 3.6vw, 14px); }
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

<script type="module">
/* YOUR EXACT JAVASCRIPT FROM THE WORKING VERSION — NO CHANGES EXCEPT THE SAFE ADDITION AT THE END */
let Application;
let screenshotCounter = 1;
let gameLoaded = false;
let selectedBuild = null;
let lottieInstance = null;
let readyMessageTimer = null;
let appInAttentionState = false;
let gameRevealed = false;
let isRevealingGame = false;

import * as PixelStreamingWebSdk from "https://unpkg.com/@arcware-cloud/pixelstreaming-websdk@1.3.32/index.mjs";

(() => {
  const { ArcwareInit } = PixelStreamingWebSdk;
  const shareIds = ["share-a913ed5d-44d6-42e6-bc9d-2e4ea72c4eba","share-a913ed5d-44d6-42e6-bc9d-2e4ea72c4eba","share-a913ed5d-44d6-42e6-bc9d-2e4ea72c4eba"];
  const selectedShareId = shareIds[Math.floor(Math.random()*shareIds.length)];
  console.log("Arcware seat selected:",selectedShareId);

  const initResult = new ArcwareInit({shareId:selectedShareId},{
    initialSettings:{AutoConnect:true,AutoPlayVideo:true,StartVideoMuted:true},
    settings:{infoButton:false,micButton:false,audioButton:false,fullscreenButton:false,settingsButton:false,connectionStrengthIcon:false}
  });

  Application = initResult.Application;
  registerArcwareAttentionHandlers();

  Application.getApplicationResponse((response)=>{
    console.log("Response from Unreal:", response);
    try{
      const parsed=JSON.parse(response);
      if(parsed.screenshot==="generating") showOverlay("Generating high resolution image");
      if(parsed.game==="loaded"){
        gameLoaded = true;
        if(!selectedBuild && !document.getElementById("buildMenu").classList.contains("visible") && !appInAttentionState){
          advanceToBuildMenuWithFade();
        }
      }
      if(parsed.modern==="loaded" || parsed.load_ui==="modern"){
        revealGameFromLevelLoading().finally(()=>showReadyMessage());
      }
    }catch(e){}
    if(response.startsWith("CreateScreenshot")) createFile(window.file);
  });

  setTimeout(()=>{ document.getElementById("video-container").appendChild(Application.rootElement); },100);

  initLottie();
  startApp();
  window.file=Application.webRtcController.file;
})();

/* === SAFE ADDITION ONLY (at the very end so it can't break anything) === */
function reportViewport() {
  if (typeof sendToUnreal === "function") {
    const w = window.innerWidth;
    const h = window.innerHeight;
    sendToUnreal(JSON.stringify({Resolution: {Width: w, Height: h}}));
    console.log("Reported viewport to Unreal (this reduces black bars):", w, "x", h);
  }
}
window.addEventListener("resize", reportViewport);
window.addEventListener("orientationchange", reportViewport);
setTimeout(reportViewport, 800);
setTimeout(reportViewport, 2000);

/* All your other functions exactly as you pasted them (initLottie, showInitialLoadingScreen, selectBuild, etc.) */
function initLottie(){ /* your code */ }
/* ... paste the rest of your functions here exactly as in your message ... */

window.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("btnTrad").addEventListener("click",()=>selectBuild("Trad"));
  document.getElementById("btnMod").addEventListener("click",()=>selectBuild("Mod"));
  document.getElementById("btnMulti").addEventListener("click",()=>selectBuild("Multi"));
  document.getElementById("retryButton").addEventListener("click",()=>location.reload());
});
</script>
</head>

</body>
</html>
