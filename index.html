<!DOCTYPE html>
<html lang="en">
<head>
<title>LUX VISUALIZER</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no" />

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
    font-family: "Futura PT", sans-serif;
}

#video-container {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

#video-container video,
#video-container canvas {
    position: absolute !important;
    inset: 0 !important;
    width: 100% !important;
    height: 100% !important;
    object-fit: contain !important;        /* Key fix for portrait */
    object-position: center center !important;
    background: black;
}

/* Allow full bleed only in landscape */
@media (orientation: landscape) {
    #video-container video,
    #video-container canvas {
        object-fit: cover !important;
    }
}

/* ==================== Your original UI styles ==================== */
#uiLayer {
    position: fixed;
    inset: 0;
    z-index: 4500;
    pointer-events: none;
}
.uiScreen {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    pointer-events: none;
}
.uiScreen.visible {
    display: flex;
}

#transitionFade {
    position: fixed;
    inset: 0;
    background: black;
    opacity: 0;
    pointer-events: none;
    z-index: 9000;
    transition: opacity 0.9s ease;
}
#transitionFade.visible {
    opacity: 1;
}

#loadingScreen, #buildMenu, #levelLoadingScreen, #readyMessage, #attentionScreen {
    background: black;
    overflow: hidden;
}

#loadingBgVideo, #menuBgVideo, #levelLoadingVideo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Keep all your other styles exactly as before */
.loadingBgShade, .menuBgShade, .levelLoadingShade, .attentionShade { /* ... */ }
.menuInner, .levelLoadingContent, .attentionInner { /* ... */ }
/* (All your @media queries, animations, etc. remain unchanged below) */

@media (max-width: 1100px) { /* your existing media queries */ }
@media (max-width: 900px) { /* ... */ }
@media (max-width: 680px) { /* ... */ }
@media (max-width: 480px) { /* ... */ }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

<script type="module">
let Application;
let screenshotCounter = 1;
let gameLoaded = false;
let selectedBuild = null;
let lottieInstance = null;
let readyMessageTimer = null;
let appInAttentionState = false;
let gameRevealed = false;
let isRevealingGame = false;

import * as PixelStreamingWebSdk from "https://unpkg.com/@arcware-cloud/pixelstreaming-websdk@1.3.32/index.mjs";

(() => {
    const { ArcwareInit } = PixelStreamingWebSdk;

    const shareIds = ["share-a913ed5d-44d6-42e6-bc9d-2e4ea72c4eba"];
    const selectedShareId = shareIds[0];

    const initResult = new ArcwareInit(
        { shareId: selectedShareId },
        {
            initialSettings: { AutoConnect: true, AutoPlayVideo: true, StartVideoMuted: true },
            settings: { infoButton: false, micButton: false, audioButton: false, fullscreenButton: false, settingsButton: false, connectionStrengthIcon: false }
        }
    );

    Application = initResult.Application;
    registerArcwareAttentionHandlers();

    Application.getApplicationResponse((response) => {
        console.log("Response from Unreal:", response);
        try {
            const parsed = JSON.parse(response);
            if (parsed.screenshot === "generating") showOverlay("Generating high resolution image");
            if (parsed.game === "loaded") {
                gameLoaded = true;
                if (!selectedBuild && !document.getElementById("buildMenu").classList.contains("visible") && !appInAttentionState) {
                    advanceToBuildMenuWithFade();
                }
            }
            if (parsed.modern === "loaded" || parsed.load_ui === "modern") {
                revealGameFromLevelLoading().finally(() => showReadyMessage());
            }
        } catch (e) {}
        if (response.startsWith("CreateScreenshot")) createFile(window.file);
    });

    // Attach stream and resolution handler
    window.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("video-container");
        container.appendChild(Application.rootElement);

        function sendResolutionToUnreal() {
            if (!Application) return;
            const pr = window.devicePixelRatio || 1;
            const w = Math.round(window.innerWidth * pr);
            const h = Math.round(window.innerHeight * pr);

            sendToUnreal({
                console: true,
                Command: `r.SetRes ${w}x${h}w`
            });
            console.log(`Sent resolution: r.SetRes ${w}x${h}w`);
        }

        window.addEventListener('resize', sendResolutionToUnreal);
        window.addEventListener('orientationchange', () => {
            setTimeout(sendResolutionToUnreal, 150);
            setTimeout(sendResolutionToUnreal, 500);
            setTimeout(sendResolutionToUnreal, 1200);
        });

        // Initial + post-load calls
        setTimeout(sendResolutionToUnreal, 600);
    });

    initLottie();
    startApp();
    window.file = Application.webRtcController.file;
})();

/* ==================== ALL YOUR ORIGINAL FUNCTIONS BELOW ==================== */
function initLottie() {
    const container = document.getElementById("lottieLoader");
    if (!container || !window.lottie) return;
    lottieInstance = window.lottie.loadAnimation({
        container, renderer: "svg", loop: true, autoplay: false, path: "loading 01.json"
    });
}
function playLottie() { if (lottieInstance) lottieInstance.play(); }
function stopLottie() { if (lottieInstance) lottieInstance.stop(); }

function hideAllUiScreens() {
    document.querySelectorAll(".uiScreen").forEach(screen => screen.classList.remove("visible"));
}

function restartMenuAnimations() {
    const animated = document.querySelectorAll("#buildMenu .menuFadeIn, #menuUnrealLogo");
    animated.forEach(el => { el.style.animation = "none"; void el.offsetWidth; });
    document.getElementById("menuLogo").style.animation = "menuFadeIn 1.2s ease 0.18s forwards";
    document.querySelector(".buttonRow").style.animation = "menuFadeIn 1.2s ease 0.35s forwards";
    document.querySelector(".menuSubtitle").style.animation = "menuFadeIn 1.2s ease 0.52s forwards";
    document.getElementById("menuUnrealLogo").style.animation = "menuFadeIn 1.2s ease 0.68s forwards";
}

function showInitialLoadingScreen() {
    hideAllUiScreens();
    const screen = document.getElementById("loadingScreen");
    const video = document.getElementById("loadingBgVideo");
    screen.classList.add("visible");
    playLottie();
    try { video.currentTime = 0; video.play().catch(() => {}); } catch (e) {}
}
function hideInitialLoadingScreen() {
    const screen = document.getElementById("loadingScreen");
    const video = document.getElementById("loadingBgVideo");
    screen.classList.remove("visible");
    stopLottie();
    try { video.pause(); } catch (e) {}
}

function showBuildMenu() {
    hideAllUiScreens();
    const screen = document.getElementById("buildMenu");
    const video = document.getElementById("menuBgVideo");
    screen.classList.add("visible");
    restartMenuAnimations();
    try { video.currentTime = 0; video.play().catch(() => {}); } catch (e) {}
}
function hideBuildMenu() {
    const screen = document.getElementById("buildMenu");
    const video = document.getElementById("menuBgVideo");
    screen.classList.remove("visible");
    try { video.pause(); } catch (e) {}
}

function setLevelLoadingContent(buildName) {
    const video = document.getElementById("levelLoadingVideo");
    const title = document.getElementById("levelLoadingTitle");
    const body1 = document.getElementById("levelLoadingBody1");
    const body2 = document.getElementById("levelLoadingBody2");
    // ... your existing if/else for Trad/Mod/Multi ...
    if (buildName === "Trad") {
        video.src = "TRAD_MOVIE.mp4";
        title.innerHTML = 'WELCOME TO THE LUX PRODUCT <strong>VISUALIZER</strong>';
        body1.textContent = "...";
        body2.textContent = "...";
    } else if (buildName === "Mod") {
        video.src = "MODERN_MOVIE.mp4";
        title.innerHTML = 'WELCOME TO THE LUX PRODUCT <strong>VISUALIZER</strong>';
        body1.textContent = "...";
        body2.textContent = "...";
    } else if (buildName === "Multi") {
        video.src = "MULTI_MOVIE.mp4";
        title.innerHTML = 'WELCOME TO THE LUX PRODUCT <strong>VISUALIZER</strong>';
        body1.textContent = "...";
        body2.textContent = "...";
    }
}

function restartLevelLoadingAnimations() {
    // your existing animation reset code...
}

function showLevelLoadingScreen(buildName) {
    hideAllUiScreens();
    setLevelLoadingContent(buildName);
    restartLevelLoadingAnimations();
    const screen = document.getElementById("levelLoadingScreen");
    const video = document.getElementById("levelLoadingVideo");
    screen.classList.add("visible");
    video.load();
    try { video.currentTime = 0; video.play().catch(() => {}); } catch (e) {}
}
function hideLevelLoadingScreen() {
    const screen = document.getElementById("levelLoadingScreen");
    const video = document.getElementById("levelLoadingVideo");
    screen.classList.remove("visible");
    try { video.pause(); } catch (e) {}
}

function fadeToBlack(duration=900) {
    return new Promise(resolve => {
        const fade = document.getElementById("transitionFade");
        fade.style.transitionDuration = `${duration}ms`;
        requestAnimationFrame(() => {
            fade.classList.add("visible");
            setTimeout(resolve, duration);
        });
    });
}
function fadeFromBlack(duration=900) {
    return new Promise(resolve => {
        const fade = document.getElementById("transitionFade");
        fade.style.transitionDuration = `${duration}ms`;
        requestAnimationFrame(() => {
            fade.classList.remove("visible");
            setTimeout(resolve, duration);
        });
    });
}

async function advanceToBuildMenuWithFade() {
    await fadeToBlack(900);
    hideInitialLoadingScreen();
    showBuildMenu();
    await fadeFromBlack(900);
}
async function transitionToLevelLoading(buildName) {
    await fadeToBlack(700);
    hideBuildMenu();
    showLevelLoadingScreen(buildName);
    await fadeFromBlack(900);
}
async function revealGameFromLevelLoading() {
    if (gameRevealed || isRevealingGame) return;
    isRevealingGame = true;
    await fadeToBlack(800);
    hideLevelLoadingScreen();
    await fadeFromBlack(2600);
    gameRevealed = true;
    isRevealingGame = false;
}

function showReadyMessage() {
    clearTimeout(readyMessageTimer);
    hideLevelLoadingScreen();
    const screen = document.getElementById("readyMessage");
    const text = document.getElementById("readyText");
    screen.classList.add("visible");
    text.classList.remove("animate");
    void text.offsetWidth;
    text.classList.add("animate");
    readyMessageTimer = setTimeout(() => {
        screen.classList.remove("visible");
        text.classList.remove("animate");
    }, 3000);
}

function shouldSurfaceAttention(message) { /* your existing function */ }
function brandMessage(message) { /* your existing function */ }
async function showAttentionScreen(message) { /* your existing function */ }
function registerArcwareAttentionHandlers() { /* your existing function */ }

function sendToUnreal(payload) {
    const message = typeof payload === "string" ? payload : JSON.stringify(payload);
    let sent = false;
    try { if (Application?.emitUIInteraction) { Application.emitUIInteraction(message); sent = true; } } catch (e) {}
    try { if (!sent && Application?.webRtcController?.emitUIInteraction) { Application.webRtcController.emitUIInteraction(message); sent = true; } } catch (e) {}
    try { if (!sent && Application?.stream?.emitUIInteraction) { Application.stream.emitUIInteraction(message); sent = true; } } catch (e) {}
    console.log(sent ? "Sent to Unreal:" : "Could not send to Unreal:", message);
    if (!sent) showAttentionScreen("Connection failed. Please retry.");
    return sent;
}

function startApp() {
    document.getElementById("transitionFade").classList.remove("visible");
    showInitialLoadingScreen();
}

async function selectBuild(buildName) {
    if (appInAttentionState) return;
    selectedBuild = buildName;
    gameRevealed = false;
    isRevealingGame = false;
    await transitionToLevelLoading(buildName);
    if (buildName === "Trad") sendToUnreal('{"LoadLevel":"Trad"}');
    else if (buildName === "Mod") sendToUnreal('{"LoadLevel":"Mod"}');
    else if (buildName === "Multi") sendToUnreal('{"LoadLevel":"Multi"}');
}

window.addEventListener("DOMContentLoaded", () => {
    document.getElementById("btnTrad").addEventListener("click", () => selectBuild("Trad"));
    document.getElementById("btnMod").addEventListener("click", () => selectBuild("Mod"));
    document.getElementById("btnMulti").addEventListener("click", () => selectBuild("Multi"));
    document.getElementById("retryButton").addEventListener("click", () => location.reload());
});

function showOverlay(message) {
    document.getElementById("overlayText").innerText = message;
    document.getElementById("screenshotOverlay").style.display = "flex";
}
function hideOverlay() {
    document.getElementById("screenshotOverlay").style.display = "none";
}
function createFile(file) {
    // your existing screenshot function...
}

/* ==================== END OF FUNCTIONS ==================== */
</script>
</head>
<body>

<div id="video-container"></div>

<div id="uiLayer">
    <!-- Paste all your original <div id="loadingScreen">, <div id="buildMenu">, <div id="levelLoadingScreen"> etc. here exactly as in your previous version -->
    <!-- I omitted repeating the 100+ lines for brevity, but keep them 100% the same -->
</div>

<div id="transitionFade"></div>

<div id="screenshotOverlay">
    <div class="overlayBox">
        <div class="spinner"></div>
        <div id="overlayText">Generating high resolution image</div>
    </div>
</div>

</body>
</html>
