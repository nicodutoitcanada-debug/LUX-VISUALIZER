<!DOCTYPE html>
<html lang="en">
<head>
<title>LUX VISUALIZER</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: "Futura PT", sans-serif;
  -webkit-tap-highlight-color: transparent;
}

#video-container {
  width: 100vw;
  height: 100vh;
  position: fixed;
  inset: 0;
  overflow: hidden;
  background: black;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

#video-container video,
#video-container canvas {
  width: 100% !important;
  height: 100% !important;
  min-width: 100%;
  min-height: 100%;
  object-fit: contain;
  background: black;
}

#uiLayer {
  position: fixed;
  inset: 0;
  z-index: 4500;
  pointer-events: none;
  touch-action: none;
}

.uiScreen {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.uiScreen.visible {
  display: flex;
}

/* Transition fade, loading, build menu, level loading, etc. styles – keep your latest from previous messages */
#transitionFade { /* ... your styles ... */ }
/* ... include all your other CSS rules for menus, loading, etc. as before ... */
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

<script type="module">
let Application;
let screenshotCounter = 1;
let gameLoaded = false;
let selectedBuild = null;
let lottieInstance = null;
let readyMessageTimer = null;
let appInAttentionState = false;
let gameRevealed = false;
let isRevealingGame = false;

// IMPORTANT: Define handlers FIRST so it's available when called
function registerArcwareAttentionHandlers() {
  if (typeof Application?.on === "function") {
    ["error", "disconnect", "close"].forEach(eventName => {
      try {
        Application.on(eventName, (evt) => {
          const message = evt?.reason || evt?.message || evt?.detail?.reason || evt?.detail?.message || String(evt || "");
          if (shouldSurfaceAttention(message)) {
            showAttentionScreen(message);
          }
        });
      } catch (e) {}
    });
  }

  window.addEventListener("unhandledrejection", (event) => {
    const reasonText = event?.reason?.message || event?.reason?.reason || String(event?.reason || "");
    if (shouldSurfaceAttention(reasonText)) {
      showAttentionScreen(reasonText);
    }
  });

  window.addEventListener("error", (event) => {
    const message = event?.message || event?.error?.message || String(event?.error || "");
    if (shouldSurfaceAttention(message)) {
      showAttentionScreen(message);
    }
  });
}

// Now the main IIFE
import * as PixelStreamingWebSdk from "https://unpkg.com/@arcware-cloud/pixelstreaming-websdk@1.3.32/index.mjs";

(() => {
  const { ArcwareInit } = PixelStreamingWebSdk;

  const shareIds = ["share-a913ed5d-44d6-42e6-bc9d-2e4ea72c4eba"];
  const selectedShareId = shareIds[Math.floor(Math.random() * shareIds.length)];
  console.log("Arcware seat selected:", selectedShareId);

  const initResult = new ArcwareInit(
    { shareId: selectedShareId },
    {
      initialSettings: { AutoConnect: true, AutoPlayVideo: true, StartVideoMuted: true },
      settings: { infoButton: false, micButton: false, audioButton: false, fullscreenButton: false, settingsButton: false, connectionStrengthIcon: false }
    }
  );

  Application = initResult.Application;

  // Now safe to call
  registerArcwareAttentionHandlers();

  Application.getApplicationResponse((response) => {
    console.log("Response from Unreal:", response);
    try {
      const parsed = JSON.parse(response);
      if (parsed.screenshot === "generating") {
        showOverlay("Generating high resolution image");
      }
      if (parsed.game === "loaded") {
        gameLoaded = true;
        if (!selectedBuild && !document.getElementById("buildMenu").classList.contains("visible") && !appInAttentionState) {
          advanceToBuildMenuWithFade();
        }
      }
      if (parsed.modern === "loaded" || parsed.load_ui === "modern") {
        revealGameFromLevelLoading().finally(() => showReadyMessage());
      }
    } catch (e) {}
    if (response.startsWith("CreateScreenshot")) {
      createFile(window.file);
    }
  });

  setTimeout(() => {
    document.getElementById("video-container").appendChild(Application.rootElement);
  }, 100);

  initLottie();
  startApp();

  window.file = Application.webRtcController.file;
})();

// Resize + viewport reporting
function handleResize() {
  const container = document.getElementById("video-container");
  if (container) {
    container.style.width = `${window.innerWidth}px`;
    container.style.height = `${window.innerHeight}px`;
  }
  const pixelRatio = window.devicePixelRatio || 1;
  const w = Math.round(window.innerWidth * pixelRatio);
  const h = Math.round(window.innerHeight * pixelRatio);
  sendToUnreal(JSON.stringify({ type: "viewport", width: w, height: h }));
  console.log("Reported viewport:", w, "x", h);
}

window.addEventListener("resize", handleResize);
window.addEventListener("orientationchange", handleResize);
setTimeout(handleResize, 300);
setTimeout(handleResize, 1200);

// Paste ALL your other function definitions here (initLottie, playLottie, stopLottie, hideAllUiScreens, restartMenuAnimations, showInitialLoadingScreen, ..., selectBuild, showOverlay, etc.)
// They should be exactly as in your previous working versions – no changes needed there.

// DOMContentLoaded listeners
window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("btnTrad").addEventListener("click", () => selectBuild("Trad"));
  document.getElementById("btnMod").addEventListener("click", () => selectBuild("Mod"));
  document.getElementById("btnMulti").addEventListener("click", () => selectBuild("Multi"));
  document.getElementById("retryButton").addEventListener("click", () => location.reload());
});
</script>
</head>
