<script type="module">
let Application;
let screenshotCounter = 1;
let gameLoaded = false;
let selectedBuild = null;
let lottieInstance = null;
let readyMessageTimer = null;
let appInAttentionState = false;
let gameRevealed = false;
let isRevealingGame = false;

// Define handlers EARLY
function registerArcwareAttentionHandlers() {
  if (typeof Application?.on === "function") {
    ["error","disconnect","close"].forEach(eventName => {
      Application.on(eventName, (evt) => {
        const message = evt?.reason || evt?.message || String(evt || "");
        if (shouldSurfaceAttention(message)) {
          showAttentionScreen(message);
        }
      });
    });
  }

  window.addEventListener("unhandledrejection", (event) => {
    const reason = event?.reason?.message || String(event?.reason || "");
    if (shouldSurfaceAttention(reason)) showAttentionScreen(reason);
  });

  window.addEventListener("error", (event) => {
    const msg = event?.message || String(event?.error || "");
    if (shouldSurfaceAttention(msg)) showAttentionScreen(msg);
  });
}

import * as PixelStreamingWebSdk from "https://unpkg.com/@arcware-cloud/pixelstreaming-websdk@1.3.32/index.mjs";

(() => {
  const { ArcwareInit } = PixelStreamingWebSdk;

  const shareIds = ["share-a913ed5d-44d6-42e6-bc9d-2e4ea72c4eba"];
  const selectedShareId = shareIds[Math.floor(Math.random() * shareIds.length)];
  console.log("Arcware seat selected:", selectedShareId);

  const initResult = new ArcwareInit(
    { shareId: selectedShareId },
    {
      initialSettings: { AutoConnect: true, AutoPlayVideo: true, StartVideoMuted: true },
      settings: { infoButton: false, micButton: false, audioButton: false, fullscreenButton: false, settingsButton: false, connectionStrengthIcon: false }
    }
  );

  Application = initResult.Application;

  // Call handlers now that it's defined
  registerArcwareAttentionHandlers();

  // Wrap response handler in try/catch to survive Zod errors
  Application.getApplicationResponse((response) => {
    console.log("Raw response from Unreal:", response);
    try {
      const parsed = JSON.parse(response);
      console.log("Parsed response:", parsed);

      if (parsed.screenshot === "generating") showOverlay("Generating high resolution image");

      if (parsed.game === "loaded") {
        gameLoaded = true;
        if (!selectedBuild && !document.getElementById("buildMenu").classList.contains("visible") && !appInAttentionState) {
          advanceToBuildMenuWithFade();
        }
      }

      if (parsed.modern === "loaded" || parsed.load_ui === "modern") {
        revealGameFromLevelLoading().finally(() => showReadyMessage());
      }
    } catch (e) {
      console.error("Error parsing Unreal response:", e, "Raw:", response);
      // Continue anyway – don't let Zod-like parse error kill the stream
    }

    if (response.startsWith("CreateScreenshot")) createFile(window.file);
  });

  // Append root element with delay + log
  setTimeout(() => {
    const container = document.getElementById("video-container");
    if (container && Application.rootElement) {
      container.appendChild(Application.rootElement);
      console.log("Root element appended to container!");
    } else {
      console.error("Failed to append rootElement – missing container or element");
    }
  }, 500);  // Slightly longer delay for safety

  initLottie();
  startApp();

  window.file = Application.webRtcController.file;
})();

// Resize handler + viewport report
function handleResize() {
  const container = document.getElementById("video-container");
  if (container) {
    container.style.width = `${window.innerWidth}px`;
    container.style.height = `${window.innerHeight}px`;
  }
  const pr = window.devicePixelRatio || 1;
  sendToUnreal(JSON.stringify({
    type: "viewport",
    width: Math.round(window.innerWidth * pr),
    height: Math.round(window.innerHeight * pr)
  }));
}
window.addEventListener("resize", handleResize);
window.addEventListener("orientationchange", handleResize);
setTimeout(handleResize, 500);
setTimeout(handleResize, 1500);

}

});
