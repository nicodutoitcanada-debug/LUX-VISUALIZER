<!DOCTYPE html>
<html lang="en">
<head>
<title>LUX VISUALIZER</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: "Futura PT", sans-serif;
  -webkit-tap-highlight-color: transparent;
}

#video-container {
  width: 100vw;
  height: 100vh;
  position: fixed;
  inset: 0;
  overflow: hidden;
  background: black;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center; /* Centers the stream if letterboxed */
}

#video-container video,
#video-container canvas {
  width: 100% !important;
  height: 100% !important;
  min-width: 100%;
  min-height: 100%;
  object-fit: contain;          /* Safe default – prevents black screen */
  background: black;
}

#uiLayer {
  position: fixed;
  inset: 0;
  z-index: 4500;
  pointer-events: none;
  touch-action: none;
}

.uiScreen {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.uiScreen.visible {
  display: flex;
}

/* GLOBAL TRANSITION FADE */
#transitionFade {
  position: fixed;
  inset: 0;
  background: black;
  opacity: 0;
  pointer-events: none;
  z-index: 9000;
  transition: opacity 0.9s ease;
}

#transitionFade.visible {
  opacity: 1;
}

/* INITIAL LOADING SCREEN */
#loadingScreen {
  background: black;
  overflow: hidden;
}

#loadingBgVideo {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* BUILD MENU */
#buildMenu {
  background: black;
  pointer-events: auto;
  overflow: hidden;
}

#menuBgVideo {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.menuInner {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 9vh 5vw 24vh;          /* Increased top/bottom for no cutoffs */
  box-sizing: border-box;
  gap: 3.5vh;
}

#menuLogo {
  width: min(240px, 50vw);
  max-width: 280px;
  opacity: 0.7;
}

.buttonRow {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: min(22px, 5vw);
  flex-wrap: wrap;
}

.menuButton img {
  width: min(140px, 32vw);
  max-width: 160px;
  opacity: 0.7;
  transition: opacity 0.25s ease;
}

.menuButton:hover img {
  opacity: 1;
}

#menuUnrealLogo {
  position: absolute;
  left: 50%;
  bottom: 6vh;
  transform: translateX(-50%);
  width: min(100px, 22vw);
  opacity: 0.7;
}

/* LEVEL LOADING SCREEN */
#levelLoadingScreen {
  background: black;
  overflow: hidden;
}

#levelLoadingVideo {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.levelLoadingContent {
  position: relative;
  z-index: 2;
  width: min(520px, 78vw);
  margin-left: 6vw;
  margin-right: auto;
  padding-top: 10vh;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  color: white;
}

.levelBrandLogo {
  width: min(200px, 36vw);
}

.levelTitle {
  font-size: clamp(19px, 3.8vw, 26px);
}

.levelBody {
  font-size: clamp(12.5px, 2.5vw, 14.5px);
}

/* MEDIA QUERIES */
@media (max-width: 1024px) {
  .menuInner { padding: 10vh 6vw 26vh; }
  #menuLogo { width: min(220px, 55vw); }
  .menuButton img { width: min(130px, 34vw); }
}

@media (max-width: 640px) {
  .menuInner { padding: 11vh 7vw 28vh; gap: 4vh; }
  #menuLogo { width: min(200px, 62vw); }
  .buttonRow { flex-direction: column; gap: 4.5vh; }
  .menuButton img { width: min(170px, 50vw); max-width: 200px; }
  #menuUnrealLogo { bottom: 7.5vh; width: min(90px, 26vw); }

  .levelLoadingContent { margin-left: 5vw; width: 88vw; padding-top: 12vh; }
  .levelBrandLogo { width: min(170px, 40vw); }
  .levelTitle { font-size: clamp(17px, 5vw, 22px); }
  .levelBody { font-size: clamp(11.5px, 3.5vw, 13px); }
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

<script type="module">
let Application;
let screenshotCounter = 1;
let gameLoaded = false;
let selectedBuild = null;
let lottieInstance = null;
let readyMessageTimer = null;
let appInAttentionState = false;
let gameRevealed = false;
let isRevealingGame = false;

import * as PixelStreamingWebSdk from "https://unpkg.com/@arcware-cloud/pixelstreaming-websdk@1.3.32/index.mjs";

(() => {
  const { ArcwareInit } = PixelStreamingWebSdk;

  const shareIds = ["share-a913ed5d-44d6-42e6-bc9d-2e4ea72c4eba"];
  const selectedShareId = shareIds[Math.floor(Math.random() * shareIds.length)];

  const initResult = new ArcwareInit(
    { shareId: selectedShareId },
    {
      initialSettings: { AutoConnect: true, AutoPlayVideo: true, StartVideoMuted: true },
      settings: { infoButton: false, micButton: false, audioButton: false, fullscreenButton: false, settingsButton: false, connectionStrengthIcon: false }
    }
  );

  Application = initResult.Application;
  registerArcwareAttentionHandlers();

  Application.getApplicationResponse((response) => {
    console.log("Response from Unreal:", response);
    try {
      const parsed = JSON.parse(response);
      if (parsed.screenshot === "generating") showOverlay("Generating high resolution image");
      if (parsed.game === "loaded") {
        gameLoaded = true;
        if (!selectedBuild && !document.getElementById("buildMenu").classList.contains("visible") && !appInAttentionState) {
          advanceToBuildMenuWithFade();
        }
      }
      if (parsed.modern === "loaded" || parsed.load_ui === "modern") {
        revealGameFromLevelLoading().finally(() => showReadyMessage());
      }
    } catch (e) {}
    if (response.startsWith("CreateScreenshot")) createFile(window.file);
  });

  setTimeout(() => {
    document.getElementById("video-container").appendChild(Application.rootElement);
  }, 100);

  initLottie();
  startApp();
  window.file = Application.webRtcController.file;
})();

// Dynamic resize + viewport reporting to Unreal
function handleResize() {
  const container = document.getElementById("video-container");
  if (container) {
    container.style.width = `${window.innerWidth}px`;
    container.style.height = `${window.innerHeight}px`;
  }

  // Report pixel-accurate size to Unreal (helps reduce black bars)
  const pixelRatio = window.devicePixelRatio || 1;
  const w = Math.round(window.innerWidth * pixelRatio);
  const h = Math.round(window.innerHeight * pixelRatio);
  sendToUnreal(JSON.stringify({ type: "viewport", width: w, height: h }));
  console.log("Reported viewport to Unreal:", w, "x", h);
}

window.addEventListener("resize", handleResize);
window.addEventListener("orientationchange", handleResize);
setTimeout(handleResize, 300);
setTimeout(handleResize, 1200);

// Your existing functions (initLottie, playLottie, stopLottie, hideAllUiScreens, restartMenuAnimations, showInitialLoadingScreen, etc.) remain unchanged from the previous working version.
// Paste them here exactly as they were.

function initLottie() {
  const container = document.getElementById("lottieLoader");
  if (!container || !window.lottie) return;
  lottieInstance = window.lottie.loadAnimation({
    container,
    renderer: "svg",
    loop: true,
    autoplay: false,
    path: "loading 01.json"
  });
}

// ... (include all your other functions: playLottie, stopLottie, hideAllUiScreens, restartMenuAnimations, showInitialLoadingScreen, hideInitialLoadingScreen, showBuildMenu, hideBuildMenu, setLevelLoadingContent, restartLevelLoadingAnimations, showLevelLoadingScreen, hideLevelLoadingScreen, fadeToBlack, fadeFromBlack, advanceToBuildMenuWithFade, transitionToLevelLoading, revealGameFromLevelLoading, showReadyMessage, shouldSurfaceAttention, brandMessage, showAttentionScreen, registerArcwareAttentionHandlers, sendToUnreal, startApp, selectBuild, showOverlay, hideOverlay, createFile)

window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("btnTrad").addEventListener("click", () => selectBuild("Trad"));
  document.getElementById("btnMod").addEventListener("click", () => selectBuild("Mod"));
  document.getElementById("btnMulti").addEventListener("click", () => selectBuild("Multi"));
  document.getElementById("retryButton").addEventListener("click", () => location.reload());
});
</script>
</head>

<body>

<div id="video-container"></div>

<div id="uiLayer">
  <!-- Paste your full UI structure here from the previous version (loadingScreen, buildMenu, levelLoadingScreen, readyMessage, attentionScreen, transitionFade, screenshotOverlay) -->
  <!-- Example snippet – replace with your exact HTML from before -->
  <div id="loadingScreen" class="uiScreen">
    <video id="loadingBgVideo" src="LOADING_BG.mp4" muted playsinline loop></video>
    <div class="loadingBgShade"></div>
    <div class="loadingWrap"><div id="lottieLoader"></div></div>
  </div>

  <div id="buildMenu" class="uiScreen">
    <video id="menuBgVideo" src="LOADING_BG.mp4" muted playsinline loop></video>
    <div class="menuBgShade"></div>
    <div class="menuInner">
      <img id="menuLogo" class="menuFadeIn" src="LOGO.png" alt="Logo">
      <div class="buttonRow menuFadeIn">
        <button id="btnTrad" class="menuButton" aria-label="Load Traditional"><img src="Load_Trad.png" alt="Load Traditional"></button>
        <button id="btnMod" class="menuButton" aria-label="Load Modern"><img src="Load_Mod.png" alt="Load Modern"></button>
        <button id="btnMulti" class="menuButton" aria-label="Load Multi"><img src="Load_Multi.png" alt="Load Multi"></button>
      </div>
      <div class="menuSubtitle menuFadeIn">CHOOSE BUILDING</div>
      <img id="menuUnrealLogo" src="UNREAL LOGO.png" alt="Unreal Logo">
    </div>
  </div>

  <!-- Add the rest: levelLoadingScreen, readyMessage, attentionScreen, transitionFade, screenshotOverlay as before -->
</div>

<div id="transitionFade"></div>

<div id="screenshotOverlay">
  <div class="overlayBox">
    <div class="spinner"></div>
    <div id="overlayText">Generating high resolution image</div>
  </div>
</div>

</body>
</html>
