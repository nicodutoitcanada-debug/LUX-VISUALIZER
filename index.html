<!DOCTYPE html>
<html lang="en">
<head>
<title>LUX VISUALIZER</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: "Futura PT", sans-serif;
  -webkit-tap-highlight-color: transparent;
}

#video-container {
  width: 100vw;
  height: 100vh;
  position: fixed;
  inset: 0;
  overflow: hidden;
  background: black;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center; /* Helps center letterbox */
}

#video-container video,
#video-container canvas {
  width: 100% !important;
  height: 100% !important;
  object-fit: contain;
  background: black;
}

#uiLayer {
  position: fixed;
  inset: 0;
  z-index: 4500;
  pointer-events: none;
  touch-action: none;
}

.uiScreen {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.uiScreen.visible {
  display: flex;
}

/* GLOBAL TRANSITION FADE */
#transitionFade {
  position: fixed;
  inset: 0;
  background: black;
  opacity: 0;
  pointer-events: none;
  z-index: 9000;
  transition: opacity 0.9s ease;
}

#transitionFade.visible {
  opacity: 1;
}

/* INITIAL LOADING SCREEN */
#loadingScreen {
  background: black;
  overflow: hidden;
}

#loadingBgVideo {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.loadingBgShade {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.28);
}

.loadingWrap {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

#lottieLoader {
  width: min(240px, 34vw);
  height: min(240px, 34vw);
  min-width: 120px;
  min-height: 120px;
}

/* BUILD MENU */
#buildMenu {
  background: black;
  pointer-events: auto;
  overflow: hidden;
}

#menuBgVideo {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.menuBgShade {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.54);
}

.menuInner {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8vh 5vw 22vh;          /* Balanced top/bottom – fixes "pushed down" & cutoffs */
  box-sizing: border-box;
  gap: 3vh;
}

.menuFadeIn {
  opacity: 0;
  animation: menuFadeIn 1.2s ease forwards;
}

#menuLogo {
  width: min(260px, 50vw);
  max-width: 280px;
  opacity: 0.7;
}

.buttonRow {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: min(22px, 5vw);
  flex-wrap: wrap;
}

.menuButton img {
  width: min(150px, 32vw);
  max-width: 170px;
  opacity: 0.7;
  transition: opacity 0.25s ease;
}

.menuButton:hover img {
  opacity: 1;
}

.menuSubtitle {
  font-size: clamp(14px, 3.2vw, 18px);
}

#menuUnrealLogo {
  position: absolute;
  left: 50%;
  bottom: 5vh;
  transform: translateX(-50%);
  width: min(105px, 22vw);
  opacity: 0.7;
}

@keyframes menuFadeIn {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

/* LEVEL LOADING – Smaller on mobile, left-aligned */
#levelLoadingScreen {
  background: black;
  overflow: hidden;
}

#levelLoadingVideo {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.levelLoadingShade {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(0,0,0,0.76) 0%, rgba(0,0,0,0.56) 26%, rgba(0,0,0,0.12) 52%, rgba(0,0,0,0) 100%);
}

.levelLoadingContent {
  position: relative;
  z-index: 2;
  width: min(520px, 75vw);
  margin-left: 6vw;
  margin-right: auto;
  padding-top: 8vh;               /* Extra top space */
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  color: white;
  pointer-events: none;
}

.levelBrandLogo {
  width: min(220px, 38vw);
}

.levelTitle {
  font-size: clamp(20px, 4vw, 26px);
}

.levelBody {
  font-size: clamp(12.5px, 2.6vw, 15px);
}

/* Other sections (readyMessage, attentionScreen, screenshotOverlay) – unchanged from your paste */

/* MEDIA QUERIES – Tighter mobile scaling */
@media (max-width: 1024px) {
  .menuInner { padding: 9vh 6vw 24vh; }
  #menuLogo { width: min(240px, 55vw); }
  .menuButton img { width: min(140px, 34vw); }
}

@media (max-width: 640px) {
  .menuInner { padding: 10vh 7vw 26vh; gap: 3.5vh; }
  #menuLogo { width: min(220px, 60vw); }
  .buttonRow { flex-direction: column; gap: 4vh; }
  .menuButton img { width: min(170px, 48vw); max-width: 200px; }
  #menuUnrealLogo { bottom: 6.5vh; width: min(95px, 25vw); }

  .levelLoadingContent { margin-left: 5vw; width: 88vw; padding-top: 10vh; }
  .levelBrandLogo { width: min(180px, 40vw); }
  .levelTitle { font-size: clamp(18px, 5vw, 24px); }
  .levelBody { font-size: clamp(12px, 3.5vw, 14px); }
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

<script type="module">
let Application;
let screenshotCounter = 1;
let gameLoaded = false;
let selectedBuild = null;
let lottieInstance = null;
let readyMessageTimer = null;
let appInAttentionState = false;
let gameRevealed = false;
let isRevealingGame = false;

import * as PixelStreamingWebSdk from "https://unpkg.com/@arcware-cloud/pixelstreaming-websdk@1.3.32/index.mjs";

(() => {
  const { ArcwareInit } = PixelStreamingWebSdk;

  const shareIds = [
    "share-a913ed5d-44d6-42e6-bc9d-2e4ea72c4eba",
    "share-a913ed5d-44d6-42e6-bc9d-2e4ea72c4eba",
    "share-a913ed5d-44d6-42e6-bc9d-2e4ea72c4eba"
  ];

  const selectedShareId = shareIds[Math.floor(Math.random() * shareIds.length)];
  console.log("Arcware seat selected:", selectedShareId);

  const initResult = new ArcwareInit(
    { shareId: selectedShareId },
    {
      initialSettings: {
        AutoConnect: true,
        AutoPlayVideo: true,
        StartVideoMuted: true
      },
      settings: {
        infoButton: false,
        micButton: false,
        audioButton: false,
        fullscreenButton: false,
        settingsButton: false,
        connectionStrengthIcon: false
      }
    }
  );

  Application = initResult.Application;

  registerArcwareAttentionHandlers();

  Application.getApplicationResponse((response) => {
    console.log("Response from Unreal:", response);
    try {
      const parsed = JSON.parse(response);
      if (parsed.screenshot === "generating") {
        showOverlay("Generating high resolution image");
      }
      if (parsed.game === "loaded") {
        gameLoaded = true;
        if (!selectedBuild && !document.getElementById("buildMenu").classList.contains("visible") && !appInAttentionState) {
          advanceToBuildMenuWithFade();
        }
      }
      if (parsed.modern === "loaded") {
        revealGameFromLevelLoading();
      }
      if (parsed.load_ui === "modern") {
        revealGameFromLevelLoading().finally(() => {
          showReadyMessage();
        });
      }
    } catch (e) {}
    if (response.startsWith("CreateScreenshot")) {
      createFile(window.file);
    }
  });

  setTimeout(() => {
    document.getElementById("video-container").appendChild(Application.rootElement);
  }, 100);

  initLottie();
  startApp();

  window.file = Application.webRtcController.file;
})();

// Viewport reporting to help Unreal adapt resolution (reduces black bars)
function reportViewport() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const pr = window.devicePixelRatio || 1;
  sendToUnreal(JSON.stringify({
    Resolution: { Width: Math.round(w * pr), Height: Math.round(h * pr) }
  }));
  console.log("Reported client viewport:", w, "x", h, "(pixel ratio", pr, ")");
}

window.addEventListener("resize", reportViewport);
window.addEventListener("orientationchange", reportViewport);
setTimeout(reportViewport, 500);
setTimeout(reportViewport, 1500);

  document.getElementById("btnTrad").addEventListener("click", () => selectBuild("Trad"));
  document.getElementById("btnMod").addEventListener("click", () => selectBuild("Mod"));
  document.getElementById("btnMulti").addEventListener("click", () => selectBuild("Multi"));
  document.getElementById("retryButton").addEventListener("click", () => location.reload());
});
</script>
